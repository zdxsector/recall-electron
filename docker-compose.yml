version: '2'

services:
  install:
    image: node:24.14.1
    command: sh -lc "corepack enable && pnpm install --no-frozen-lockfile --config.legacy-peer-deps=true"
    volumes:
      - $PWD:/app
    working_dir: /app
  
  dev:
    image: node:24.14.1
    command: sh -lc "corepack enable && pnpm start"
    ports:
      - "4000:4000"
    volumes:
      - $PWD:/app
    working_dir: /app
